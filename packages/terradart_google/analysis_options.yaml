include: package:lints/recommended.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    # Factory dartdoc references like `[topic.id]` resolve at compile time;
    # leave them as warnings so we surface broken references locally.
    dead_code: error
    unused_import: error
    unused_local_variable: error
    # Existing factories use `if (x != null) 'k': x.toTfJson()` to encode
    # optional argMap entries. The Dart 3.10 SDK upgrade (required by
    # schemantic 0.1.3) lights this up as
    # `use_null_aware_elements`. Migrating all hand-rolled factories is a
    # separate refactor; ignore the lint here so v0.0.1-dev ships clean.
    use_null_aware_elements: ignore
  exclude:
    # Schemantic-emitted `.g.dart` files have stylistic warnings (escaped
    # chars in description strings, etc.) that we intentionally don't fix
    # in generated output.
    - "lib/src/generated/*.schema.g.dart"

linter:
  rules:
    - prefer_const_constructors
    - prefer_const_constructors_in_immutables
    - prefer_final_locals
    - prefer_relative_imports
