outputDir: secret_manager
classDocComment: |-
  /// Factory wrapper for `google_secret_manager_secret_version`.
  ///
  /// **Per spec §10.4 (write-only API):** prefer `secretDataWo` +
  /// `secretDataWoVersion` over `secretData`. The write-only path keeps the
  /// plaintext value out of Terraform state. Bump `secretDataWoVersion` to
  /// trigger rotation.
  ///
  /// `secret_data` is `@Deprecated`; using it logs an analyzer warning at
  /// every call site.

paramOrder:
  - secret
  - secret_data_wo
  - secret_data_wo_version
  - secret_data
  - enabled
  - is_secret_data_base64
  - deletion_policy
  - project

extraGetters: |2
    TfRef<String> get id => TfRef.attribute<String>(this, 'id');
    TfRef<String> get nameRef => TfRef.attribute<String>(this, 'name');
    TfRef<String> get version => TfRef.attribute<String>(this, 'version');

# Schema types `secret_data_wo_version` as `number` → `num` by default.
# Hand-written tightens it to `int` (it's a counter; non-integer values
# make no sense for rotation tracking).
dartTypeOverrides:
  secret_data_wo_version: int

# The schema does NOT mark `secret_data` deprecated, but the terradart
# project policy (spec §10.4) deprecates it in favor of the write-only
# pair (`secret_data_wo` + `secret_data_wo_version`) so plaintext stays
# out of Terraform state.
deprecatedParams:
  secret_data: Use secretDataWo for state safety (§10.4)
