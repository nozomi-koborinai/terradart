classDocComment: |-
  /// Factory wrapper for `google_project_service`
  /// (provider `hashicorp/google ~> 7.0`).
  ///
  /// Enables a single Google Cloud API on a project. Each Tier 1 GCP API
  /// (Pub/Sub, Cloud Tasks, Secret Manager, Cloud Scheduler, …) requires its
  /// matching `google_project_service` resource to be enabled before its
  /// resources can be created — typically wired as an explicit `dependsOn`
  /// so Terraform applies the API enablement first.
  ///
  /// Required identity:
  /// - [localName]: Terraform local name (the address segment after
  ///   `google_project_service.`).
  /// - `service`: API endpoint name, e.g. `pubsub.googleapis.com`.
  ///   Pass `TfArg.literal('pubsub.googleapis.com')`.
  ///
  /// Optional knobs:
  /// - `project`: explicit project ID; defaults to the provider's `project`
  ///   when omitted.
  /// - `disableOnDestroy`: when `false`, leaves the API enabled if the
  ///   resource is destroyed. **Recommended `false` for personal/shared
  ///   projects** — disabling APIs that other resources outside Terraform's
  ///   knowledge depend on can break unrelated workloads.
  /// - `disableDependentServices`: when `true`, also disables any APIs that
  ///   depend on this one. Default `false`.
  ///
  /// Example pairing with [GooglePubsubTopic]:
  /// ```dart
  /// final pubsubApi = GoogleProjectService(
  ///   localName: 'pubsub',
  ///   service: TfArg.literal('pubsub.googleapis.com'),
  ///   disableOnDestroy: TfArg.literal(false),
  /// );
  ///
  /// final orders = GooglePubsubTopic(
  ///   localName: 'orders',
  ///   name: TfArg.literal('orders-prod'),
  ///   dependsOn: [pubsubApi],
  /// );
  /// ```
  ///
  /// Composition pattern: extends `Resource<$GoogleProjectService>` for
  /// runtime behavior, implements `$GoogleProjectService` for the schemantic
  /// schema surface. `argMap` stores `TfArg<dynamic>?` entries directly;
  /// synth's JSON-encoding pass walks them and calls `arg.toTfJson()` to
  /// encode at write time.

paramOrder:
  - service
  - project
  - disable_on_destroy
  - disable_dependent_services

extraGetters: |2
    /// Reference to `id` attribute (full path `[project]/services/[service]`).
    /// Use this when another resource needs to reference the enablement, e.g.
    /// as a dependency interpolation target.
    TfRef<String> get id => TfRef.attribute<String>(this, 'id');
