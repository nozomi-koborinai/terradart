name: terradart_codegen
description: terradart Stage 1 codegen — parses Terraform provider schema JSON and Magic Modules YAML and emits annotated abstract Dart classes. Ships the terradart CLI.
version: 0.5.0-dev
homepage: https://github.com/nozomi-koborinai/terradart
repository: https://github.com/nozomi-koborinai/terradart
issue_tracker: https://github.com/nozomi-koborinai/terradart/issues
documentation: https://github.com/nozomi-koborinai/terradart#readme

topics:
  - terraform
  - infrastructure
  - codegen
  - google-cloud

environment:
  sdk: ^3.6.0

resolution: workspace

executables:
  terradart: terradart

dependencies:
  args: ^2.5.0
  io: ^1.0.4
  yaml: ^3.1.2
  path: ^1.9.0
  meta: ^1.15.0
  dart_style: ^3.0.0
  stack_trace: ^1.11.1
  terradart_core: ^0.5.0-dev

dev_dependencies:
  http: ^1.0.0
  lints: ^6.0.0
  pub_semver: ^2.1.0
  test: ^1.25.6
