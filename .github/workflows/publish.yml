name: Publish to pub.dev

on:
  push:
    tags:
      - 'v*.*.*-dev'
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v0.0.4-dev). Required for workflow_dispatch.'
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  publish-leaves:
    name: publish ${{ matrix.package }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [terradart_annotations, terradart_core, terradart_codegen]
    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version
      - run: dart pub get

      - name: Pre-publish pubspec mutations
        run: tool/prepare_publish.sh "${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}" ${{ matrix.package }}

      - name: Publish to pub.dev
        run: dart pub publish --force
        working-directory: packages/${{ matrix.package }}

  publish-google:
    name: publish terradart_google
    needs: publish-leaves
    runs-on: ubuntu-latest
    steps:
      - name: Wait for pub.dev index propagation
        run: |
          echo "Waiting 3 minutes for pub.dev index to update before publishing terradart_google..."
          sleep 180

      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version
      - run: dart pub get

      - name: Verify generated schema and wrapper files
        working-directory: packages/terradart_google
        run: |
          schema_g_count=$(find lib/src/generated -name "*.schema.g.dart" | wc -l)
          wrapper_count=$(find lib/src -mindepth 2 -name 'google_*.dart' -not -path 'lib/src/generated/*' | wc -l)
          if [ "$schema_g_count" -ne 12 ] || [ "$wrapper_count" -ne 13 ]; then
            echo "::error::Expected 12 schema.g.dart + 13 wrapper, got $schema_g_count + $wrapper_count"
            exit 1
          fi

      - name: Pre-publish pubspec mutations
        run: tool/prepare_publish.sh "${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}" terradart_google

      - name: Publish to pub.dev
        run: dart pub publish --force
        working-directory: packages/terradart_google
