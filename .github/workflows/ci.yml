name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [terradart_core, terradart_codegen, terradart_google]
    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - if: matrix.package == 'terradart_core'
        run: dart format --output=none --set-exit-if-changed .
      - if: matrix.package == 'terradart_core'
        run: dart analyze packages/ --fatal-infos --fatal-warnings
      - run: dart test --reporter=github
        working-directory: packages/${{ matrix.package }}

  wrap_check:
    name: terradart wrap --check
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - name: Verify generated wrappers are up to date
        working-directory: packages/terradart_codegen
        run: |
          dart run bin/terradart.dart wrap \
            --provider hashicorp/google \
            --source test/fixtures/wrap/source \
            --output ../terradart_google/lib/src \
            --check

  wrap_init_check:
    name: terradart wrap-init smoke
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - name: wrap-init determinism + loader invariant
        working-directory: packages/terradart_codegen
        run: dart test --run-skipped -t e2e --name 'wrap-init'

  wrap_promote_check:
    name: terradart wrap-promote smoke
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - name: wrap-promote determinism (L4)
        working-directory: packages/terradart_codegen
        run: dart test --run-skipped -t e2e --name 'wrap-promote'

  terraform_validate:
    name: terraform validate (${{ matrix.example }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        example: [pubsub, cloud_tasks, secret_manager, cloud_scheduler, iam, compute, kms, storage, bigquery, dns, ops, cloud_run, monitoring, cloud_functions, firestore, firebase_app_hosting, firebase_app_check, firebase_data_connect, firebase_remote_config]
    steps:
      - name: Job start
        id: job_start
        run: echo "started_ns=$(date +%s%N)" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.15.2"

      - name: Setup checkpoint
        id: after_setup
        run: echo "ts_ns=$(date +%s%N)" >> "$GITHUB_OUTPUT"

      - name: Workspace pub get
        id: pub_get_workspace
        run: |
          start=$(date +%s%N)
          dart pub get
          echo "duration_ms=$(( ($(date +%s%N) - start) / 1000000 ))" >> "$GITHUB_OUTPUT"

      - name: Example pub get
        id: pub_get_example
        working-directory: examples/${{ matrix.example }}_quickstart
        run: |
          start=$(date +%s%N)
          dart pub get
          echo "duration_ms=$(( ($(date +%s%N) - start) / 1000000 ))" >> "$GITHUB_OUTPUT"

      - name: Synth
        id: synth
        working-directory: examples/${{ matrix.example }}_quickstart
        env:
          GCP_PROJECT_ID: ci-test-project-id
          DB_PASSWORD: ci-test-secret
        run: |
          start=$(date +%s%N)
          dart run bin/infra.dart
          echo "duration_ms=$(( ($(date +%s%N) - start) / 1000000 ))" >> "$GITHUB_OUTPUT"

      - name: Terraform validate
        id: tf_validate
        working-directory: examples/${{ matrix.example }}_quickstart/tf-out
        run: |
          start=$(date +%s%N)
          terraform fmt -check
          terraform init -backend=false
          terraform validate
          echo "duration_ms=$(( ($(date +%s%N) - start) / 1000000 ))" >> "$GITHUB_OUTPUT"

      - name: Phase 5.0 timing summary
        if: always()
        run: |
          job_start_ns="${{ steps.job_start.outputs.started_ns }}"
          after_setup_ns="${{ steps.after_setup.outputs.ts_ns }}"
          setup_ms=$(( (after_setup_ns - job_start_ns) / 1000000 ))
          {
            echo "### ${{ matrix.example }}_quickstart timing"
            echo ""
            echo "| Step | Duration (ms) |"
            echo "|---|---|"
            echo "| Setup (checkout + Dart + Terraform install) | $setup_ms |"
            echo "| Workspace \`pub get\` | ${{ steps.pub_get_workspace.outputs.duration_ms }} |"
            echo "| Example \`pub get\` | ${{ steps.pub_get_example.outputs.duration_ms }} |"
            echo "| Synth (\`dart run bin/infra.dart\`) | ${{ steps.synth.outputs.duration_ms }} |"
            echo "| \`terraform fmt + init + validate\` | ${{ steps.tf_validate.outputs.duration_ms }} |"
          } >> "$GITHUB_STEP_SUMMARY"
